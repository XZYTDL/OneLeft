<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/root.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/prologue.css">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div id="player">
            <div class="cover">
                <img class="blur" src="./assets/album-cover.png" alt="Album Cover Blur">
                <img src="./assets/album-cover.png" alt="Album Cover">
                <div class="placeholder"></div>
            </div>
            <div class="content">
                <h3 id="title">TITLE</h3>
                <p id="artists">ARTISTS</p>
            </div>
            <div class="bar">
                <div class="progress"></div>
                <div class="thumb"></div>
                <div class="remain"></div>
            </div>
            <div class="buttons">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-skip-back-icon lucide-skip-back">
                    <path
                        d="M17.971 4.285A2 2 0 0 1 21 6v12a2 2 0 0 1-3.029 1.715l-9.997-5.998a2 2 0 0 1-.003-3.432z" />
                    <path d="M3 20V4" />
                </svg>
                <div id="play">
                    <svg id="play-btn" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-circle-play-icon lucide-circle-play">
                        <circle cx="12" cy="12" r="10" />
                        <path class="play-arrow"
                            d="M9 9.003a1 1 0 0 1 1.517-.859l4.997 2.997a1 1 0 0 1 0 1.718l-4.997 2.997A1 1 0 0 1 9 14.996z" />
                    </svg>
                    <svg id="pause-btn" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="hidden lucide lucide-circle-pause-icon lucide-circle-pause">
                        <circle cx="12" cy="12" r="10" />
                        <line class="play-arrow" x1="10" x2="10" y1="15" y2="9" />
                        <line class="play-arrow" x1="14" x2="14" y1="15" y2="9" />
                    </svg>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-skip-forward-icon lucide-skip-forward">
                    <path d="M21 4v16" />
                    <path d="M6.029 4.285A2 2 0 0 0 3 6v12a2 2 0 0 0 3.029 1.715l9.997-5.998a2 2 0 0 0 .003-3.432z" />
                </svg>
            </div>
        </div>
        <div id="lyrics" class="hide">
            <div class="lyric" id="lyric-1">
                <span>I </span><span>spent </span><span>the </span><span>last </span><span>two </span><span>weeks
                </span><span>just </span><span>screaming</span>
            </div>
            <div class="lyric" id="lyric-2">
                <span>I </span><span>spent </span><span>the </span><span>last </span><span>two </span><span>weeks
                </span><span>just </span><span>screaming</span>
            </div>
            <div class="lyric" id="lyric-3">
                <span>Trying </span><span>to </span><span>work </span><span>you </span><span>out </span><span>is
                </span><span data-word="killing">killing</span>
            </div>
            <div class="lyric" id="lyric-4">
                <span>Ever </span><span>since </span><span>my </span><span class="heart">
                    heart
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-heart-icon lucide-heart">
                        <path
                            d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5" />
                    </svg>
                </span><span>'s </span><span>been </span><span>missing</span>
            </div>
        </div>
    </div>

    <script src="./js/lyrics.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/prologue.js"></script>
</body>

</html>
